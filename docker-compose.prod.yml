# docker-compose.prod.yml
# Stack de production Équatis sur OVH VPS.
#
# Deux modes possibles :
#
# A. Postgres OVH Managed (recommandé)
#    - Décommenter uniquement le service `app`
#    - DATABASE_URL pointe vers l'instance OVH
#
# B. Postgres bundled sur le même VPS (plus simple, OK pour 5 users + clients)
#    - Décommenter `app` ET `postgres`
#    - DATABASE_URL pointe vers `postgres:5432`

services:
  app:
    image: equatis:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equatis-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Si Postgres bundled (mode B), décommenter :
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  # Mode B uniquement — Postgres sur le même VPS.
