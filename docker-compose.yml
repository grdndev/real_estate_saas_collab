# Stack locale Équatis — usage développement uniquement.
# Pour la prod, OVH Managed PostgreSQL + OVH Object Storage S3-compatible.

services:
  postgres:
    image: postgres:17-alpine
    container_name: equatis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: equatis
      POSTGRES_PASSWORD: equatis_dev_password
      POSTGRES_DB: equatis
    ports:
      - "5432:5432"
    volumes:
      - equatis_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equatis -d equatis"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Stockage S3-compatible local (mime OVH Object Storage).
  # Console : http://localhost:9001 (login minio / minio_dev_password)
  minio:
    image: minio/minio:latest
    container_name: equatis-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - equatis_minio_data:/data
    healthcheck:
      test:
        ["CMD", "curl", "-fI", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Crée le bucket par défaut "equatis-documents-dev" au démarrage de MinIO.
  minio-init:
    image: minio/mc:latest
    container_name: equatis-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio_dev_password;
      mc mb --ignore-existing local/equatis-documents-dev;
      mc anonymous set none local/equatis-documents-dev;
      echo 'Bucket equatis-documents-dev prêt';
      "
    restart: "no"

  # Antivirus pour scan des uploads (Phase 2.3).
  # Démarrage long (~2min — téléchargement signatures).
  # Décommenter pour activer le scan ClamAV en local ; sinon le worker
  # marque les fichiers CLEAN automatiquement (mode stub).
  # clamav:
  #   image: clamav/clamav:latest
  #   container_name: equatis-clamav
  #   restart: unless-stopped
  #   ports:
  #     - "3310:3310"
  #   volumes:
  #     - equatis_clamav_data:/var/lib/clamav

volumes:
  equatis_pg_data:
  equatis_minio_data:
  # equatis_clamav_data:
