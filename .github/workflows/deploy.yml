name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ship:
    name: Build & Deploy to OVH
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: []
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          echo "image_tag=${IMAGE_NAME}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.image_tag }}
            ${{ steps.tag.outputs.image_latest }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OVH_VPS_HOST }}
          username: ${{ secrets.OVH_VPS_USER }}
          key: ${{ secrets.OVH_VPS_SSH_KEY }}
          port: ${{ secrets.OVH_VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.OVH_VPS_DEPLOY_PATH }}

            # Authentification GHCR (token GitHub stocké dans le PAT du serveur)
            echo "${{ secrets.OVH_GHCR_PAT }}" | docker login ghcr.io \
              -u ${{ secrets.OVH_GHCR_USER }} --password-stdin

            # Mise à jour du fichier docker-compose.prod.yml depuis le repo
            git fetch origin main
            git checkout origin/main -- docker-compose.prod.yml

            # Override de l'image avec le tag SHA pour traçabilité
            export IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"
            cat > docker-compose.override.yml <<EOF
            services:
              app:
                image: $IMAGE_TAG
                build: !reset null
            EOF

            docker compose -f docker-compose.prod.yml -f docker-compose.override.yml pull app
            docker compose -f docker-compose.prod.yml -f docker-compose.override.yml up -d --no-build app
            docker image prune -f
